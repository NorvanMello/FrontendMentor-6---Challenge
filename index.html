<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>

<body>

  <main class="main-cards">
    <div class="container">
      <div class="left-card">
        <div class="title">
          <p>Your Result</p>
        </div>

        <div class="score">
         <p>
          <span>76</span>
          <span>of 100</span> 
         </p>
        </div>

        <div class="description">
          <h2>Great</h2>
          <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
      </div>

      <div class="right-card">
        <div class="right-title">
          <p>Summary</p>
        </div>

        <div class="right-content">
          <div class="summary-item reaction">
            <div class="summary-left">
              <img src="./assets/images/icon-reaction.svg" alt="">
              <span>Reaction</span>
            </div>

            <div class="summary-score">
              <span class="score-bold">80</span>
              <span class="score-light"> / 100</span>
            </div>
          </div>

           <div class="summary-item memory">
            <div class="summary-left">
              <img src="./assets/images/icon-memory.svg" alt="">
              <span>Memory</span>
            </div>

            <div class="summary-score">
              <span class="score-bold">92</span>
              <span class="score-light"> / 100</span>
            </div>
          </div>

           <div class="summary-item verbal">
            <div class="summary-left">
              <img src="./assets/images/icon-verbal.svg" alt="">
              <span>Verbal</span>
            </div>

            <div class="summary-score">
              <span class="score-bold">61</span>
              <span class="score-light"> / 100</span>
            </div>
          </div>

           <div class="summary-item visual">
            <div class="summary-left">
              <img src="./assets/images/icon-visual.svg" alt="">
              <span>Visual</span>
            </div>

            <div class="summary-score">
              <span class="score-bold">73</span>
              <span class="score-light"> / 100</span>
            </div>
          </div>
        </div>

        <div class="right-btn">
          <button>Continue</button>
        </div>
      </div>
    </div>
  </main>
  
</body>
</html>
